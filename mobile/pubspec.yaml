name: amirani_app
description: Amirani — AI-Powered Smart Health & Gym Ecosystem
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.6.2

  # Networking
  dio: ^5.9.1

  # Models
  freezed_annotation: ^2.4.1
  json_annotation: ^4.8.1

  # Local Storage
  flutter_secure_storage: ^9.2.4
  path_provider: ^2.1.5

  # UI & Animations
  flutter_animate: ^4.5.2
  google_fonts: ^6.2.1
  fl_chart: ^0.70.2
  shimmer: ^3.0.0
  cached_network_image: ^3.4.1

  # Payments
  flutter_stripe: ^11.5.0

  # Notifications
  firebase_core: ^3.12.1
  firebase_messaging: ^15.2.5
  flutter_local_notifications: ^18.0.1

  # Timezone (for scheduled notifications)
  timezone: ^0.9.4

  # Utilities
  flutter_dotenv: ^5.2.1
  connectivity_plus: ^6.1.4
  intl: ^0.20.1
  equatable: ^2.0.7
  dartz: ^0.10.1
  logger: ^2.5.0
  url_launcher: ^6.3.1
  image_picker: ^1.1.2
  permission_handler: ^11.4.0
  confetti: ^0.8.0
  shared_preferences: ^2.5.4
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  dio_smart_retry: ^7.0.1

  # Social Auth
  google_sign_in: ^6.2.0
  sign_in_with_apple: ^6.1.4

  # QR Code
  mobile_scanner: ^6.0.0
  qr_flutter: ^4.1.0
  screenshot: ^3.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  mocktail: ^1.0.3

  # Code Generation
  build_runner: ^2.4.13
  freezed: ^2.5.2
  json_serializable: ^6.8.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.1
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "assets/images/app_logo_triangle.png"
  min_sdk_android: 21

flutter:
  uses-material-design: true
  generate: true
  assets:
    - assets/images/
    - assets/animations/
    - assets/icons/
    - assets/data/
    - .env
